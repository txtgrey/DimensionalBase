name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,server,security]"
      - name: Run tests with coverage
        run: pytest tests/ conformance/ -v --cov=dimensionalbase --cov-report=xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install ruff black mypy numpy fastapi cryptography
      - name: Ruff
        run: ruff check dimensionalbase/ tests/
      - name: Black
        run: black --check dimensionalbase/ tests/
      - name: Mypy
        run: mypy dimensionalbase/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tooling
        run: pip install -e ".[dev,server,security]"
      - name: pip-audit
        run: python -m pip_audit
      - name: Bandit
        run: python -m bandit -q -r dimensionalbase -x tests

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packaging tooling
        run: pip install -e ".[dev]"
      - name: Build artifacts
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Install built wheel with runtime extras
        run: |
          wheel=$(echo dist/*.whl)
          pip install "${wheel}[cli,server,security,mcp]"
      - name: Smoke test packaged assets
        run: |
          cd /tmp
          python - <<'PY'
          from importlib import resources

          static_dir = resources.files("dimensionalbase").joinpath("server", "static")
          required = ("index.html", "style.css", "app.js")
          missing = [name for name in required if not static_dir.joinpath(name).is_file()]
          if missing:
              raise SystemExit(f"Missing packaged static assets: {missing}")

          print("Packaged static assets verified.")
          PY
      - name: Smoke test packaged entry points
        run: |
          dimensionalbase --help >/dev/null
          dimensionalbase-server --help >/dev/null
          dimensionalbase-mcp --help >/dev/null
